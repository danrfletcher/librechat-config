version: 1.2.4   # Keep matching your current version; update if you pull newer image
cache: true      # Strongly recommended for performance

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - openrouter/auto
          - google/gemini-3.1-flash-lite-preview
        fetch: true
      dropParams:
        - "stop"
        - "frequency_penalty"
        - "presence_penalty"
      titleConvo: true
      titleModel: "openai/gpt-4o-mini"   # Cheap/fast for titles; change if desired
      summarize: false
      summaryModel: "openai/gpt-4o-mini"
      forcePrompt: false
      modelDisplayLabel: "OpenRouter"
